name: Tools Shop - TestmuAI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

  workflow_dispatch:
    inputs:
      ENV:
        description: 'Environment to test'
        required: true
        type: choice
        options:
          - Local
          - Lambda
        default: 'Local'

jobs:
  run-tests:
    name: Run - ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2


      - name: Launch Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: "-no-snapshot -noaudio -no-window"
          script: gradlew connectedCheck


      - name: Download APK
        run: |
            curl -L "https://drive.google.com/uc?export=download&id=1ATlJF6_JOeo_QXoBvCwXld8K1rAOkxAi" -o app-debug.apk
            ls -lh app-debug.apk

      

      - name: Prepare Allure Folder
        run: mkdir -p allure-results

      - name: Pull Docker Image
        run: docker pull sbpy/lambda-test:latest

      - name: Verify LambdaTest credentials
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          if [ -z "$LT_USERNAME" ]; then 
            echo "❌ Missing LT_USERNAME"
            exit 1
          fi
          if [ -z "$LT_ACCESS_KEY" ]; then 
            echo "❌ Missing LT_ACCESS_KEY"
            exit 1
          fi
          echo "✅ LambdaTest credentials configured"

      - name: Run Tests WDIO
        env:
          ENV: ${{ github.event.inputs.ENV || 'Local' }}
        shell: bash
        run: |
          echo "ENV=$ENV"
          if [ "$ENV" = "Local" ]; then
            echo "Running tests locally"
            docker run --rm \
              -v ${{ github.workspace }}:/app \
              -w /app \
              sbpy/lambda-test:latest \
              sh -c "npm install && npm run wdio"
          else
            echo "Running tests on LambdaTest"
            docker run --rm \
              -v ${{ github.workspace }}:/app \
              -w /app \
              -e LT_USERNAME=${{ secrets.LT_USERNAME }} \
              -e LT_ACCESS_KEY=${{ secrets.LT_ACCESS_KEY }} \
              sbpy/lambda-test:latest \
              sh -c "npm install && npm run lt"
          fi

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            allure-results/
            logs/
          retention-days: 7

      - name: Test status
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            echo "✅ Tests completed with results"
            echo "📊 Results count: $(ls -1 allure-results/*.json 2>/dev/null | wc -l)"
          else
            echo "⚠️ No test results found"
            exit 1
          fi
