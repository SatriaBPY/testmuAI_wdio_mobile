name: Tools Shop - TestmuAI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      ENV:
        description: 'Environment to test'
        required: true
        type: choice
        options:
          - Local
          - Lambda
        default: 'Local'

jobs:
  run-tests:
    name: Run - ${{ github.ref_name }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Appium 2.11.3 (same as successful source)
        run: |
          npm install appium@2.11.3 appium-uiautomator2-driver@4.0.0 --save-dev
          
      - name: Download APK
        run: |
          mkdir -p apps
          curl -L "https://testsmith.ams3.cdn.digitaloceanspaces.com/artifacts/practice-software-testing.apk" -o apps/app-debug.apk
          ls -lh apps/app-debug.apk

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium Server
        run: |
          npx appium --allow-insecure adb_shell &
        env:
          APPIUM_HOME: ${{ github.workspace }}

      - name: Prepare Allure Folder
        run: mkdir -p allure-results logs

      - name: Run Android Tests on Emulator
        if: github.event.inputs.ENV == 'Local' || github.event.inputs.ENV == ''
        uses: reactivecircus/android-emulator-runner@v2
        env:
          APPIUM_HOME: ${{ github.workspace }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: "-no-snapshot -noaudio -no-window -gpu swiftshader_indirect"
          script: |
            adb install apps/app-debug.apk
            adb shell pm grant io.appium.settings android.permission.ACCESS_FINE_LOCATION || true
            adb shell pm grant io.appium.settings android.permission.ACCESS_COARSE_LOCATION || true
            adb shell settings put global hide_error_dialogs 1 || true
            adb shell input keyevent 82
            sleep 5
            CI=true DEVICE_COUNT=1 DEVICE_0_UDID=emulator-5554 DEVICE_0_NAME="Pixel 6" DEVICE_0_PLATFORM=android DEVICE_0_SYSTEM_PORT=8200 DEVICE_0_CHROMEDRIVER_PORT=9515 DEVICE_0_SETTLE_PAUSE=2500 npm run wdio

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            allure-results/
            logs/
          retention-days: 7