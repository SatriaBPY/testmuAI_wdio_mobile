name: Tools Shop - TestmuAI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      ENV:
        description: 'Environment to test'
        required: true
        type: choice
        options:
          - Local
          - Lambda
        default: 'Local'

jobs:
  run-tests:
    name: Run - ${{ github.ref_name }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Download APK
        run: |
          mkdir -p apps
          curl -L "https://drive.google.com/uc?export=download&id=1ATlJF6_JOeo_QXoBvCwXld8K1rAOkxAi" -o apps/app-debug.apk
          ls -lh apps/app-debug.apk

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium Globally
        run: |
          npm install -g appium@2.0.0
          appium driver install uiautomator2@2.39.1

      - name: Start Appium Server
        run: appium --allow-insecure adb_shell &
        env:
          APPIUM_HOME: ${{ github.workspace }}

      - name: Prepare Allure Folder
        run: mkdir -p allure-results logs

      - name: Pull Docker Image (for LambdaTest)
        run: docker pull sbpy/lambda-test:latest

      - name: Run Android Tests on Emulator
        if: github.event.inputs.ENV == 'Local' || github.event.inputs.ENV == ''
        uses: reactivecircus/android-emulator-runner@v2
        env:
          APPIUM_HOME: ${{ github.workspace }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: "-no-snapshot -noaudio -no-window -gpu swiftshader_indirect"
          script: |
            # Install APK
            adb install apps/app-debug.apk
            
            # Grant location permissions
            adb shell pm grant io.appium.settings android.permission.ACCESS_FINE_LOCATION || true
            adb shell pm grant io.appium.settings android.permission.ACCESS_COARSE_LOCATION || true
            
            # Hide error dialogs
            adb shell settings put global hide_error_dialogs 1 || true
            
            # Unlock screen
            adb shell input keyevent 82
            
            # Wait for Appium ready
            for i in {1..30}; do
              if curl -sf http://127.0.0.1:4723/status > /dev/null; then
                echo "✅ Appium server ready"
                break
              fi
              echo "Waiting for Appium... ($i/30)"
              sleep 1
            done
            
            # Run WDIO tests
            echo "🧪 Running WDIO tests..."
            CI=true \
            DEVICE_COUNT=1 \
            DEVICE_0_UDID=emulator-5554 \
            DEVICE_0_NAME="Pixel 6" \
            DEVICE_0_PLATFORM=android \
            DEVICE_0_SYSTEM_PORT=8200 \
            DEVICE_0_CHROMEDRIVER_PORT=9515 \
            DEVICE_0_SETTLE_PAUSE=2500 \
            npm run wdio

      - name: Run Tests on LambdaTest
        if: github.event.inputs.ENV == 'Lambda'
        env:
          LT_USERNAME: ${{ secrets.LT_USERNAME }}
          LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
        run: |
          if [ -z "$LT_USERNAME" ] || [ -z "$LT_ACCESS_KEY" ]; then 
            echo "❌ Missing LambdaTest credentials"
            exit 1
          fi
          
          echo "Running tests on LambdaTest"
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e LT_USERNAME=${{ secrets.LT_USERNAME }} \
            -e LT_ACCESS_KEY=${{ secrets.LT_ACCESS_KEY }} \
            sbpy/lambda-test:latest \
            sh -c "npm run lt"

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            allure-results/
            logs/
          retention-days: 7

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            test-results/
            error-screenshots/
          retention-days: 7

      - name: Test status
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            echo "✅ Tests completed with results"
            echo "📊 Results count: $(find allure-results -name '*.json' | wc -l)"
          else
            echo "⚠️ No test results found"
          fi