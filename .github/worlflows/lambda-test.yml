name: Tools Shoop - TestmuAI

on: 
   workflow_dispatch:
      inputs:
         branch:
           required: true
      trigger_id:
           required: true

jobs:
   run-tests:
      name: Run - ${{ github.event.inputs.branch }}
      runs-on: ubuntu-latest

      steps:
         - name: Checkout Repository
           uses: actions/checkout@v4
           with:
              ref: ${{ github.event.inputs.branch }}

         - name: Prepare Allure Folder
           run: mkdir -p allure-results

         - name: Pull Docker Image
           run: docker pull sbpy/lambda-test:latest

         - name: Verify LambdaTest credentials
           env:
              LT_USERNAME: ${{ secrets.LT_USERNAME }}
              LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}
           run: |
                  if [ -z "$LT_USERNAME" ]; then echo "Missing LT_USERNAME"; exit 1; fi
                  if [ -z "$LT_ACCESS_KEY" ]; then echo "Missing LT_ACCESS_KEY"; exit 1; fi
                  echo "✅ LambdaTest credentials configured"

         - name: Run Tests WDIO 
           run: |
               docker run --rm \
                 -v ${{ github.workspace }}:/app \
                 -w /app \
                 sbpy/lambda-test:latest  \
                 sh -c "
                  npm install 
                  && npm run lt
                 "

         - name: Upload Allure Results
           uses: actions/upload-artifact@v4
           with:
              name: allure-results-${{ github.run_id}}-${{ github.run_attempt}}
              path: allure-results/

         - name: Test status
           run: |
              if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
                echo "✅ Tests completed with results"
              else
                echo "⚠️ No test results found"
              fi